<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Infografía: La crisis de los residuos">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#050807"/>
      <stop offset="1" stop-color="#0b1210"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#39ff88" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#39ff88" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="604" rx="36" fill="rgba(255,255,255,0.04)" stroke="rgba(57,255,136,0.25)" stroke-width="3"/>

  <text x="90" y="120" font-family="system-ui,Segoe UI,Arial" font-size="42" font-weight="900" fill="#eefbf5">
    La crisis de los residuos
  </text>
  <text x="90" y="160" font-family="system-ui,Segoe UI,Arial" font-size="18" font-weight="700" fill="#9fb8ad">
    Datos ilustrativos para aprendizaje (ODC UdeC)
  </text>

  <g transform="translate(90 210)">
    <rect x="0" y="0" width="320" height="160" rx="22" fill="rgba(57,255,136,0.10)" stroke="rgba(57,255,136,0.30)"/>
    <text x="24" y="46" font-family="system-ui,Segoe UI,Arial" font-size="18" font-weight="800" fill="#39ff88">Generación</text>
    <text x="24" y="92" font-family="system-ui,Segoe UI,Arial" font-size="42" font-weight="900" fill="#eefbf5">+12%</text>
    <text x="24" y="128" font-family="system-ui,Segoe UI,Arial" font-size="16" font-weight="700" fill="#9fb8ad">Aumento anual (ejemplo)</text>
  </g>

  <g transform="translate(450 210)">
    <rect x="0" y="0" width="320" height="160" rx="22" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="24" y="46" font-family="system-ui,Segoe UI,Arial" font-size="18" font-weight="800" fill="#39ff88">Operación</text>
    <text x="24" y="92" font-family="system-ui,Segoe UI,Arial" font-size="42" font-weight="900" fill="#eefbf5">Rutas fijas</text>
    <text x="24" y="128" font-family="system-ui,Segoe UI,Arial" font-size="16" font-weight="700" fill="#9fb8ad">Sin priorización por datos</text>
  </g>

  <g transform="translate(810 210)">
    <rect x="0" y="0" width="320" height="160" rx="22" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="24" y="46" font-family="system-ui,Segoe UI,Arial" font-size="18" font-weight="800" fill="#39ff88">Impacto</text>
    <text x="24" y="92" font-family="system-ui,Segoe UI,Arial" font-size="42" font-weight="900" fill="#eefbf5">Desbordes</text>
    <text x="24" y="128" font-family="system-ui,Segoe UI,Arial" font-size="16" font-weight="700" fill="#9fb8ad">Riesgo sanitario y quejas</text>
  </g>

  <g transform="translate(90 410)">
    <rect x="0" y="0" width="1040" height="200" rx="26" fill="rgba(255,255,255,0.03)" stroke="rgba(57,255,136,0.20)"/>
    <text x="24" y="52" font-family="system-ui,Segoe UI,Arial" font-size="22" font-weight="900" fill="#eefbf5">¿Qué cambia con datos?</text>
    <rect x="24" y="76" width="420" height="10" rx="8" fill="url(#accent)"/>
    <text x="24" y="120" font-family="system-ui,Segoe UI,Arial" font-size="18" font-weight="800" fill="#39ff88">Indicadores mínimos</text>
    <text x="24" y="152" font-family="system-ui,Segoe UI,Arial" font-size="16" font-weight="700" fill="#9fb8ad">
      Incidencias · Tiempo de respuesta · Km/combustible · Línea base (antes/después)
    </text>
    <text x="24" y="186" font-family="system-ui,Segoe UI,Arial" font-size="16" font-weight="700" fill="#9fb8ad">
      Con evidencia: priorización, rutas por umbral, evaluación y mejora continua.
    </text>
  </g>
</svg>
