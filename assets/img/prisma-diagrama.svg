<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Diagrama PRISMA simplificado">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#050807"/>
      <stop offset="1" stop-color="#0b1210"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>
  <text x="90" y="120" font-family="system-ui,Segoe UI,Arial" font-size="42" font-weight="900" fill="#eefbf5">PRISMA (simplificado)</text>
  <text x="90" y="160" font-family="system-ui,Segoe UI,Arial" font-size="18" font-weight="700" fill="#9fb8ad">Flujo didáctico: identificación → cribado → elegibilidad → inclusión</text>

  <g fill="rgba(255,255,255,0.04)" stroke="rgba(57,255,136,0.25)" stroke-width="3">
    <rect x="90" y="230" width="420" height="120" rx="22"/>
    <rect x="690" y="230" width="420" height="120" rx="22"/>
    <rect x="90" y="410" width="420" height="120" rx="22"/>
    <rect x="690" y="410" width="420" height="120" rx="22"/>
  </g>

  <g font-family="system-ui,Segoe UI,Arial" fill="#eefbf5">
    <text x="120" y="280" font-size="22" font-weight="900">Identificación</text>
    <text x="120" y="312" font-size="16" font-weight="700" fill="#9fb8ad">Búsqueda en bases de datos</text>

    <text x="720" y="280" font-size="22" font-weight="900">Cribado</text>
    <text x="720" y="312" font-size="16" font-weight="700" fill="#9fb8ad">Revisión de títulos/resúmenes</text>

    <text x="120" y="460" font-size="22" font-weight="900">Elegibilidad</text>
    <text x="120" y="492" font-size="16" font-weight="700" fill="#9fb8ad">Lectura de texto completo</text>

    <text x="720" y="460" font-size="22" font-weight="900">Inclusión</text>
    <text x="720" y="492" font-size="16" font-weight="700" fill="#9fb8ad">Síntesis de estudios finales</text>
  </g>

  <g stroke="rgba(238,251,245,0.75)" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M520 290 L670 290"/>
    <path d="M900 360 L900 390"/>
    <path d="M670 470 L520 470"/>
    <path d="M300 360 L300 390"/>
  </g>

  <g fill="#39ff88">
    <circle cx="520" cy="290" r="6"/>
    <circle cx="670" cy="290" r="6"/>
    <circle cx="900" cy="360" r="6"/>
    <circle cx="900" cy="390" r="6"/>
    <circle cx="670" cy="470" r="6"/>
    <circle cx="520" cy="470" r="6"/>
    <circle cx="300" cy="360" r="6"/>
    <circle cx="300" cy="390" r="6"/>
  </g>
</svg>
